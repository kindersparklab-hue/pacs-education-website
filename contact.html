<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact PACS | Premium Academic Consultancy Services</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container"><a href="index.html"><img src="Assets/Images/logo.png" alt="PACS Logo" class="nav-logo"></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button class="btn-primary">Book Consultation</button>
    </nav>

    <section class="contact-header">
        <h1>Get in Touch</h1>
        <p>Ready to start your project? Let’s discuss your academic needs.</p>
    </section>

    <section class="contact-form-container">
        <form id="contact-form">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <input type="tel" placeholder="Phone">
            <select>
                <option>Select Service Required</option>
                <option>Thesis & Dissertation Support</option>
                <option>Data Analysis</option>
                <option>Academic Editing</option>
            </select>
            <textarea placeholder="Message" rows="5"></textarea>
            <div class="contact-btns">
                <button type="submit" class="btn-primary">Send Message</button>
                <button class="btn-outline">WhatsApp Us</button>
            </div>
        </form>
    </section>

</body>
</html>
